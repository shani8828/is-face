<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LobbyVision | Secure Stream</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #dcb477;
        --accent: #5b2fff;
        --bg-dark: #050505;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(220, 180, 119, 0.2);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-dark);
        background-image:
          radial-gradient(
            circle at 20% 30%,
            rgba(91, 47, 255, 0.05) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(220, 180, 119, 0.05) 0%,
            transparent 40%
          );
        color: #eee;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .header {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 30px;
        text-align: center;
        z-index: 10;
        background: linear-gradient(to bottom, var(--bg-dark), transparent);
      }

      .header h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 1.2rem;
        letter-spacing: 8px;
        color: var(--primary);
        text-shadow: 0 0 20px rgba(220, 180, 119, 0.3);
        text-transform: uppercase;
      }

      .video-wrapper {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 20px;
      }

      .video-container {
        position: relative;
        width: 100%;
        max-width: 1000px;
        aspect-ratio: 16/9;
        border-radius: 12px;
        padding: 2px;
        background: linear-gradient(
          135deg,
          var(--border),
          transparent,
          var(--border)
        );
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      }

      .video-inner {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .video-inner img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .video-inner::before {
        content: " ";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.02),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.02)
          );
        background-size:
          100% 4px,
          3px 100%;
        z-index: 2;
        pointer-events: none;
      }

      .hud-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        bottom: 20px;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        z-index: 3;
      }

      .status-tag {
        align-self: flex-start;
        background: rgba(255, 0, 0, 0.2);
        color: #ff4d4d;
        padding: 4px 12px;
        border-radius: 4px;
        font-family: "Orbitron";
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        border: 1px solid rgba(255, 0, 0, 0.3);
        animation: blink 2s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .controls {
        position: fixed;
        bottom: 40px;
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .hud-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 12px 24px;
        border-radius: 100px;
        border: 1px solid var(--border);
        font-size: 13px;
        letter-spacing: 1px;
        color: var(--primary);
      }

      .copy-btn {
        background: var(--primary);
        border: none;
        padding: 12px 28px;
        border-radius: 100px;
        color: #000;
        font-weight: 700;
        font-family: "Inter";
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 20px rgba(220, 180, 119, 0.2);
      }

      .copy-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(220, 180, 119, 0.4);
        filter: brightness(1.1);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>LobbyVision</h1>
    </header>

    <main class="video-wrapper">
      <div class="video-container">
        <div class="video-inner">
          <div class="hud-overlay">
            <div class="status-tag">● Live Feed</div>
          </div>
          <img src="/video" alt="Security Feed" />
        </div>
      </div>
    </main>

    <div class="controls">
      <div class="hud-card">
        Uptime: <span id="timer" style="font-weight: bold">00:00:00</span>
      </div>
      <div class="hud-card">
        <a href="http://localhost:5173/dashboard" target="_blank">Dashboard</a>
      </div>
    </div>

    <script>
      let startTime = Date.now();
      function updateTimer() {
        let diff = Math.floor((Date.now() - startTime) / 1000);
        let hrs = Math.floor(diff / 3600);
        let mins = Math.floor((diff % 3600) / 60);
        let secs = diff % 60;
        document.getElementById("timer").innerText =
          (hrs < 10 ? "0" + hrs : hrs) +
          ":" +
          (mins < 10 ? "0" + mins : mins) +
          ":" +
          (secs < 10 ? "0" + secs : secs);
      }
      setInterval(updateTimer, 1000);
    </script>
  </body>
</html>
